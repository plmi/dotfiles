# i3blocks config
# Mirrors waybar modules: vpn | target | public_ip | network | cpu | ram | battery
# Right-to-left on the bar; order here is left-to-right as i3blocks renders it.

separator=false
separator_block_width=0
markup=none

# ── Custom: VPN ───────────────────────────────────────────────────────────────
[vpn]
command=echo " $(~/.config/waybar/scripts/vpn-status.sh | jq -r .text) "
interval=5
color=#a6e3a1

# ── Custom: Target ────────────────────────────────────────────────────────────
[target]
command=echo " $(~/.config/waybar/scripts/target-status.sh | jq -r .text) "
interval=3
color=#f38ba8

# ── Custom: Public IP ─────────────────────────────────────────────────────────
[public_ip]
command=echo " $(~/.config/waybar/scripts/public-ip.sh | jq -r .text) "
interval=300
color=#89dceb

# ── Network ───────────────────────────────────────────────────────────────────
[network]
command=echo " $(~/.config/i3/scripts/network.sh) "
interval=5
color=#89b4fa

# ── CPU ───────────────────────────────────────────────────────────────────────
[cpu]
command=vmstat 1 2 | awk 'END{printf " CPU %d%% ", 100-$15}'
interval=3
color=#fab387

# ── Memory ────────────────────────────────────────────────────────────────────
[memory]
command=echo " RAM $(free | awk '/Mem/{printf "%d", $3/$2*100}')% "
interval=2
color=#a6e3a1

# ── Battery ───────────────────────────────────────────────────────────────────
[battery]
command=echo " $(~/.config/i3/scripts/battery.sh) "
interval=30
color=#89b4fa

# ── Clock ─────────────────────────────────────────────────────────────────────
[time]
command=date '+  %d.%m.%Y %H:%M  '
interval=5
color=#cdd6f4
