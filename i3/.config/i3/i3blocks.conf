# i3blocks config
# Mirrors waybar modules: vpn | target | public_ip | network | volume | cpu | ram | temp | battery
# Right-to-left on the bar; order here is left-to-right as i3blocks renders it.

separator=true
separator_block_width=12
markup=none

# ── Custom: VPN ───────────────────────────────────────────────────────────────
[vpn]
command=~/.config/waybar/scripts/vpn-status.sh | jq -r .text
interval=5
color=#a6e3a1

# ── Custom: Target ────────────────────────────────────────────────────────────
[target]
command=~/.config/waybar/scripts/target-status.sh | jq -r .text
interval=3
color=#f38ba8

# ── Custom: Public IP ─────────────────────────────────────────────────────────
[public_ip]
command=~/.config/waybar/scripts/public-ip.sh | jq -r .text
interval=300
color=#89dceb

# ── Network ───────────────────────────────────────────────────────────────────
[network]
command=~/.config/i3/scripts/network.sh
interval=5
color=#89b4fa

# ── Volume ────────────────────────────────────────────────────────────────────
[volume]
command=~/.config/i3/scripts/volume.sh
interval=once
signal=10
color=#cba6f7

# ── CPU ───────────────────────────────────────────────────────────────────────
[cpu]
command=echo "CPU $(grep 'cpu ' /proc/stat | awk '{u=$2+$4; t=$2+$3+$4+$5; if (NR==1){u1=u; t1=t} else printf "%d", (u-u1)/(t-t1)*100}' /proc/stat /proc/stat)"
interval=2
color=#fab387

# ── Memory ────────────────────────────────────────────────────────────────────
[memory]
command=echo "RAM $(free | awk '/Mem/{printf "%d", $3/$2*100}')%"
interval=2
color=#a6e3a1

# ── Temperature ───────────────────────────────────────────────────────────────
[temperature]
command=~/.config/i3/scripts/temperature.sh
interval=5
color=#f9e2af

# ── Battery ───────────────────────────────────────────────────────────────────
[battery]
command=~/.config/i3/scripts/battery.sh
interval=30
color=#89b4fa

# ── Clock ─────────────────────────────────────────────────────────────────────
[time]
command=date '+%d.%m.%Y %H:%M'
interval=5
color=#cdd6f4
